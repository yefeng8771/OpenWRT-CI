name: Sync Upstream

on:
  schedule:
    - cron: '20 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and sync
        run: |
          git remote add upstream https://github.com/davidtall/OpenWRT-CI.git 2>/dev/null || true
          git fetch upstream
          git checkout main
          git merge --ff-only upstream/main
          git push origin main
