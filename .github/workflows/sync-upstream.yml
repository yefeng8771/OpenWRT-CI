name: Sync Upstream

on:
  schedule:
    - cron: '20 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and sync
        run: |
          git remote add upstream https://github.com/davidtall/OpenWRT-CI.git 2>/dev/null || true
          git fetch upstream
          git checkout main
          if git merge --no-edit upstream/main; then
            git push origin main
          else
            echo "sync-upstream merge failed, please resolve conflicts manually" >&2
            exit 1
          fi
