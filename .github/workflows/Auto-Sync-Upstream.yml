# 自动同步上游并触发编译
name: Auto-Sync-Upstream

on:
  # 每天早上3点检查上游更新（上海时间11点）
  schedule:
    - cron: '0 19 * * *'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream
        run: |
          git remote add upstream https://github.com/davidtall/OpenWRT-CI.git 2>/dev/null || git remote set-url upstream https://github.com/davidtall/OpenWRT-CI.git
          git fetch upstream main

      - name: Check for Updates
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Upstream has $BEHIND new commits"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          fi

      - name: Merge Upstream
        if: steps.check.outputs.has_updates == 'true'
        run: |
          set +e
          git merge upstream/main --no-edit
          MERGE_EXIT=$?
          set -e

          if [ $MERGE_EXIT -ne 0 ]; then
            echo "::warning::Merge conflict detected, auto-resolving with upstream preference..."

            CONFLICTS=$(git diff --name-only --diff-filter=U)
            echo "Conflicting files: $CONFLICTS"

            # 对于已外置到 Patches/ 的自定义文件，优先采用上游版本
            # 因为自定义会在 CI 构建时通过 Patches/ 重新应用
            for FILE in $CONFLICTS; do
              echo "Resolving: $FILE -> upstream version"
              git checkout --theirs "$FILE"
              git add "$FILE"
            done

            git commit --no-edit -m "chore: sync upstream (auto-resolved conflicts)"
          fi

      - name: Push Changes
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git push origin main
          echo "Changes pushed successfully"

      - name: Trigger Build
        if: steps.check.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'QCA-6.12-VIKINGYFY.yml',
              ref: 'main'
            });

      - name: Summary
        if: steps.check.outputs.has_updates == 'true'
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Upstream commits merged: ${{ steps.check.outputs.behind }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changes pushed to main" >> $GITHUB_STEP_SUMMARY
          echo "- Build triggered" >> $GITHUB_STEP_SUMMARY

      - name: No Updates
        if: steps.check.outputs.has_updates != 'true'
        run: |
          echo "## No Updates" >> $GITHUB_STEP_SUMMARY
          echo "Already in sync with upstream" >> $GITHUB_STEP_SUMMARY
