# 自动同步上游并触发编译
name: Auto-Sync-Upstream

on:
  # 每天凌晨3点（上海时间11点）
  schedule:
    - cron: '0 19 * * *'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream
        run: |
          git remote add upstream https://github.com/davidtall/OpenWRT-CI.git 2>/dev/null || git remote set-url upstream https://github.com/davidtall/OpenWRT-CI.git
          git fetch upstream main

      - name: Check for Updates
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Upstream has $BEHIND new commits"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          fi

      - name: Merge Upstream
        if: steps.check.outputs.has_updates == 'true'
        run: |
          set +e
          git merge upstream/main --no-edit
          MERGE_EXIT=$?
          set -e

          if [ $MERGE_EXIT -ne 0 ]; then
            echo "::warning::Merge conflict detected, auto-resolving..."

            CONFLICTS=$(git diff --name-only --diff-filter=U)
            echo "Conflicting files: $CONFLICTS"

            for FILE in $CONFLICTS; do
              echo "Resolving: $FILE -> upstream version (patches will re-apply during build)"
              git checkout --theirs "$FILE"
              git add "$FILE"
            done

            git commit --no-edit -m "chore: sync upstream (auto-resolved conflicts)"
          fi

      - name: Push via GitHub API
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用 GitHub API push，绕过 workflow 文件权限限制
          # 将 merge 结果推送到新分支，然后通过 API 创建 PR 并自动合并
          SYNC_BRANCH="sync/upstream-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$SYNC_BRANCH"
          git push origin "$SYNC_BRANCH"

          # 通过 API 创建 PR
          PR_NUMBER=$(gh pr create \
            --title "chore: sync upstream $(date +%Y-%m-%d)" \
            --body "Auto-synced from davidtall/OpenWRT-CI main branch. This PR will be auto-merged." \
            --base main \
            --head "$SYNC_BRANCH" \
            --json number \
            --jq '.number')

          echo "Created PR #$PR_NUMBER"

          # 自动合并 PR（通过 API 合并不受 workflow 权限限制）
          gh pr merge "$PR_NUMBER" --merge --admin --delete-branch
          echo "PR merged successfully"

      - name: Trigger Build
        if: steps.check.outputs.has_updates == 'true'
        run: |
          sleep 5
          gh workflow run QCA-6.12-VIKINGYFY.yml
          echo "Build triggered"

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.has_updates }}" == "true" ]; then
            echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
            echo "- Upstream commits merged: ${{ steps.check.outputs.behind }}" >> $GITHUB_STEP_SUMMARY
            echo "- Changes pushed via PR merge" >> $GITHUB_STEP_SUMMARY
            echo "- Build triggered" >> $GITHUB_STEP_SUMMARY
          else
            echo "## No Updates" >> $GITHUB_STEP_SUMMARY
            echo "Already in sync with upstream" >> $GITHUB_STEP_SUMMARY
          fi
