# 自动同步上游并触发编译
name: Auto-Sync-Upstream

on:
  # 每天凌晨3点（上海时间11点）
  schedule:
    - cron: '0 19 * * *'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 通过 GitHub API 比较 fork 和上游的差异
          BEHIND=$(gh api repos/davidtall/OpenWRT-CI/compare/davidtall:main...yefeng8771:main \
            --jq '.behind_by')
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

          if [ "$BEHIND" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Upstream has $BEHIND new commits"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          fi

      - name: Sync via GitHub API
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用 GitHub Merge API 直接合并，无需 git push，绕过 workflow 权限限制
          # 这个 API 合并不需要 workflows 权限
          RESULT=$(gh api repos/yefeng8771/OpenWRT-CI/merges \
            -X POST \
            -f base="main" \
            -f head="davidtall:main" \
            -f commit_message="chore: auto-sync upstream (davidtall/OpenWRT-CI)" \
            2>&1) || true

          if echo "$RESULT" | grep -q "Conflict"; then
            echo "::warning::Merge conflict via API, falling back to manual resolve..."

            # 需要手动处理冲突：checkout，merge，解决冲突，用 API 逐文件提交
            # 由于 GITHUB_TOKEN 无法 push workflow 文件变更，我们只同步非 workflow 文件
            echo "Conflicts detected, attempting selective sync..."

            # 获取上游所有变更文件
            CHANGED_FILES=$(gh api repos/davidtall/OpenWRT-CI/compare/davidtall:main...yefeng8771:main \
              --jq '.files[] | select(.status != "removed") | .filename')

            for FILE in $CHANGED_FILES; do
              # 跳过 workflow 文件
              if [[ "$FILE" == .github/workflows/* ]]; then
                echo "Skipping workflow file: $FILE (requires manual sync)"
                continue
              fi

              # 获取上游文件内容
              FILE_SHA=$(gh api repos/yefeng8771/OpenWRT-CI/contents/"$FILE" --jq '.sha' 2>/dev/null || echo "")
              UPSTREAM_CONTENT=$(gh api repos/davidtall/OpenWRT-CI/contents/"$FILE" --jq '.content' 2>/dev/null || echo "")

              if [ -n "$UPSTREAM_CONTENT" ]; then
                if [ -n "$FILE_SHA" ]; then
                  # 更新已有文件
                  gh api repos/yefeng8771/OpenWRT-CI/contents/"$FILE" \
                    -X PUT \
                    -f message="sync: update $FILE from upstream" \
                    -f content="$UPSTREAM_CONTENT" \
                    -f sha="$FILE_SHA" \
                    --jq '.commit.sha' 2>/dev/null || echo "  Failed to update: $FILE"
                else
                  # 新文件
                  gh api repos/yefeng8771/OpenWRT-CI/contents/"$FILE" \
                    -X PUT \
                    -f message="sync: add $FILE from upstream" \
                    -f content="$UPSTREAM_CONTENT" \
                    --jq '.commit.sha' 2>/dev/null || echo "  Failed to add: $FILE"
                fi
                echo "Synced: $FILE"
              fi
            done
          else
            echo "Merge succeeded: $RESULT"
          fi

      - name: Trigger Build
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 5
          gh workflow run QCA-6.12-VIKINGYFY.yml
          echo "Build triggered"

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.has_updates }}" == "true" ]; then
            echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
            echo "- Upstream commits behind: ${{ steps.check.outputs.behind }}" >> $GITHUB_STEP_SUMMARY
            echo "- Synced via GitHub API" >> $GITHUB_STEP_SUMMARY
            echo "- Build triggered" >> $GITHUB_STEP_SUMMARY
          else
            echo "## No Updates" >> $GITHUB_STEP_SUMMARY
            echo "Already in sync with upstream" >> $GITHUB_STEP_SUMMARY
          fi
