# 自动同步上游 davidtall/OpenWRT-CI 到 main 并触发 QWRT 编译
#
# 设计：用 GitHub Merges API（POST /repos/X/Y/merges）创建一个真正的合并提交，
# 而不是 force-reset。这样我们的自定义文件（Patches/、Config/CUSTOM.txt、
# .github/workflows/QWRT.yml、.github/workflows/Auto-Sync-Upstream.yml、files/、docs/）
# 不会被擦除。
#
# 工作流：
#   1. 比较 ahead/behind
#   2. 若 behind == 0 直接退出
#   3. 在我们仓库里创建临时分支 upstream-sync-temp 指向上游 HEAD
#   4. POST /repos/yefeng8771/OpenWRT-CI/merges  base=main  head=upstream-sync-temp
#      - 成功：合并提交进 main
#      - 409：冲突，开 issue，跳过本次
#   5. 删除临时分支
#   6. 关闭 QCA-6.12-VIKINGYFY.yml 的自动触发（防它在 Auto-Clean 完成后跑非 QWRT 矩阵）
#   7. 触发 QWRT.yml
name: Auto-Sync-Upstream

on:
  schedule:
    - cron: '0 19 * * *'   # 每天 03:00 上海
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: write

env:
  UPSTREAM_OWNER: davidtall
  UPSTREAM_REPO: OpenWRT-CI
  UPSTREAM_BRANCH: main
  TEMP_BRANCH: upstream-sync-temp

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Compare with upstream
        id: cmp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INFO=$(gh api "repos/${{ github.repository }}/compare/${UPSTREAM_OWNER}:${UPSTREAM_BRANCH}...${{ github.repository_owner }}:main")
          AHEAD=$(echo "$INFO" | jq -r '.ahead_by')
          BEHIND=$(echo "$INFO" | jq -r '.behind_by')
          UPSTREAM_SHA=$(gh api "repos/${UPSTREAM_OWNER}/${UPSTREAM_REPO}/commits/${UPSTREAM_BRANCH}" --jq '.sha')
          echo "ahead=$AHEAD"   >> $GITHUB_OUTPUT
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "Status: ahead=$AHEAD, behind=$BEHIND, upstream HEAD=$UPSTREAM_SHA"

      - name: Skip if up to date
        if: steps.cmp.outputs.behind == '0'
        run: echo "Already up to date with upstream"

      - name: Create temp ref pointing to upstream HEAD
        if: steps.cmp.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${TEMP_BRANCH}" 2>/dev/null || true
          gh api -X POST   "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/heads/${TEMP_BRANCH}" \
            -f sha="${{ steps.cmp.outputs.upstream_sha }}"
          echo "Temp branch ${TEMP_BRANCH} created at ${{ steps.cmp.outputs.upstream_sha }}"

      - name: Merge upstream into main
        id: merge
        if: steps.cmp.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          RESPONSE=$(gh api -X POST "repos/${{ github.repository }}/merges" \
            -f base="main" \
            -f head="${TEMP_BRANCH}" \
            -f commit_message="chore(sync): merge upstream ${UPSTREAM_OWNER}/${UPSTREAM_REPO}@${{ steps.cmp.outputs.upstream_sha }}" \
            2>&1)
          STATUS=$?
          set -e
          echo "$RESPONSE"
          if [ $STATUS -ne 0 ]; then
            if echo "$RESPONSE" | grep -qi "merge conflict"; then
              echo "result=conflict" >> $GITHUB_OUTPUT
            elif echo "$RESPONSE" | grep -qi "204"; then
              echo "result=already" >> $GITHUB_OUTPUT
            else
              echo "result=error" >> $GITHUB_OUTPUT
            fi
          else
            echo "result=success" >> $GITHUB_OUTPUT
            MERGE_SHA=$(echo "$RESPONSE" | jq -r '.sha // empty')
            echo "merge_sha=$MERGE_SHA" >> $GITHUB_OUTPUT
            echo "Merge commit: $MERGE_SHA"
          fi

      - name: Open issue on conflict
        if: steps.merge.outputs.result == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_SHA: ${{ steps.cmp.outputs.upstream_sha }}
          AHEAD: ${{ steps.cmp.outputs.ahead }}
          BEHIND: ${{ steps.cmp.outputs.behind }}
        run: |
          cat > /tmp/issue.md <<'BODY'
          Auto-Sync 检测到与上游存在合并冲突，请本地解决：

          ```
          git remote add upstream https://github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}.git
          git fetch upstream ${UPSTREAM_BRANCH}
          git checkout main
          git merge upstream/${UPSTREAM_BRANCH}
          # 解决冲突后
          git push origin main
          ```
          BODY
          # 用 envsubst 替换占位
          UPSTREAM_OWNER="$UPSTREAM_OWNER" UPSTREAM_REPO="$UPSTREAM_REPO" UPSTREAM_BRANCH="$UPSTREAM_BRANCH" \
            envsubst < /tmp/issue.md > /tmp/issue.final.md
          echo "" >> /tmp/issue.final.md
          echo "ahead=${AHEAD}, behind=${BEHIND}, upstream_sha=${UPSTREAM_SHA}" >> /tmp/issue.final.md
          gh issue create \
            --title "Auto-Sync: merge conflict with upstream@${UPSTREAM_SHA}" \
            --body-file /tmp/issue.final.md \
            --label "auto-sync-conflict" || true

      - name: Cleanup temp ref
        if: always() && steps.cmp.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${TEMP_BRANCH}" 2>/dev/null || true

      - name: Disable upstream's auto-trigger workflows
        if: steps.merge.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 这些是上游自带、会在 Auto-Clean 完成时自动跑全设备矩阵的工作流，
          # 我们用 QWRT.yml 接管，所以同步成功后强制 disable（幂等）。
          for wf in QCA-6.12-VIKINGYFY.yml QCA-6.12-LiBwrt.yml WRT-CORE-TEST.yml; do
            gh workflow disable "$wf" --repo ${{ github.repository }} 2>/dev/null || true
          done

      - name: Trigger QWRT build
        if: steps.merge.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run QWRT.yml --repo ${{ github.repository }}
          echo "QWRT build triggered"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Auto-Sync Summary"
            echo "- Upstream:    \`${UPSTREAM_OWNER}/${UPSTREAM_REPO}@${UPSTREAM_BRANCH}\`"
            echo "- Upstream SHA: ${{ steps.cmp.outputs.upstream_sha }}"
            echo "- ahead/behind: ${{ steps.cmp.outputs.ahead }} / ${{ steps.cmp.outputs.behind }}"
            echo "- Merge result: ${{ steps.merge.outputs.result }}"
            [ -n "${{ steps.merge.outputs.merge_sha }}" ] && echo "- Merge commit: ${{ steps.merge.outputs.merge_sha }}"
          } >> $GITHUB_STEP_SUMMARY
