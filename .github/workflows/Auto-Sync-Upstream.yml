# 自动同步上游并触发编译
name: Auto-Sync-Upstream

on:
  # 每天凌晨3点（上海时间11点）
  schedule:
    - cron: '0 19 * * *'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEHIND=$(gh api repos/yefeng8771/OpenWRT-CI/compare/davidtall:main...yefeng8771:main \
            --jq '.behind_by')
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          if [ "$BEHIND" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Upstream has $BEHIND new commits"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          fi

      - name: Sync Upstream Files
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取上游变更的文件列表
          CHANGED_FILES=$(gh api repos/davidtall/OpenWRT-CI/compare/davidtall:main...yefeng8771:main \
            --jq '.files[] | "\(.filename) \(.status) \(.sha // empty)"')

          if [ -z "$CHANGED_FILES" ]; then
            echo "No file-level changes detected"
            exit 0
          fi

          SYNCED=0
          SKIPPED=0

          while IFS=' ' read -r FILE STATUS UPSTREAM_SHA; do
            # 跳过 Patches/ 目录（我们的自定义文件）
            if [[ "$FILE" == Patches/* ]]; then
              echo "Skip (our custom): $FILE"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # 跳过 workflow 文件（GITHUB_TOKEN 无权限写入）
            if [[ "$FILE" == .github/workflows/* ]]; then
              echo "Skip (workflow permission): $FILE"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # 跳过 Config/CUSTOM.txt（我们的自定义）
            if [[ "$FILE" == Config/CUSTOM.txt ]]; then
              echo "Skip (our custom): $FILE"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            if [ "$STATUS" = "removed" ]; then
              # 删除文件
              FILE_SHA=$(gh api repos/yefeng8771/OpenWRT-CI/contents/"$FILE" --jq '.sha' 2>/dev/null || echo "")
              if [ -n "$FILE_SHA" ]; then
                gh api repos/yefeng8771/OpenWRT-CI/contents/"$FILE" \
                  -X DELETE \
                  -f message="sync: remove $FILE (upstream removed)" \
                  -f sha="$FILE_SHA" \
                  --jq '.commit.sha' 2>/dev/null || echo "  Failed to delete: $FILE"
                echo "Removed: $FILE"
                SYNCED=$((SYNCED + 1))
              fi
            else
              # 获取上游文件内容
              UPSTREAM_CONTENT=$(gh api repos/davidtall/OpenWRT-CI/contents/"$FILE" --jq '.content' 2>/dev/null || echo "")

              if [ -z "$UPSTREAM_CONTENT" ]; then
                echo "Skip (no content): $FILE"
                continue
              fi

              # 获取当前文件 SHA（如果存在）
              FILE_SHA=$(gh api repos/yefeng8771/OpenWRT-CI/contents/"$FILE" --jq '.sha' 2>/dev/null || echo "")

              if [ -n "$FILE_SHA" ]; then
                # 更新已有文件
                gh api repos/yefeng8771/OpenWRT-CI/contents/"$FILE" \
                  -X PUT \
                  -f message="sync: update $FILE from upstream" \
                  -f content="$UPSTREAM_CONTENT" \
                  -f sha="$FILE_SHA" \
                  --jq '.commit.sha' 2>/dev/null || echo "  Failed to update: $FILE"
              else
                # 新文件
                gh api repos/yefeng8771/OpenWRT-CI/contents/"$FILE" \
                  -X PUT \
                  -f message="sync: add $FILE from upstream" \
                  -f content="$UPSTREAM_CONTENT" \
                  --jq '.commit.sha' 2>/dev/null || echo "  Failed to add: $FILE"
              fi
              echo "Synced: $FILE"
              SYNCED=$((SYNCED + 1))
            fi
          done <<< "$CHANGED_FILES"

          echo ""
          echo "Synced: $SYNCED files, Skipped: $SKIPPED files"

      - name: Trigger Build
        if: steps.check.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run QCA-6.12-VIKINGYFY.yml --repo yefeng8771/OpenWRT-CI
          echo "Build triggered"

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.has_updates }}" == "true" ]; then
            echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
            echo "- Upstream commits behind: ${{ steps.check.outputs.behind }}" >> $GITHUB_STEP_SUMMARY
            echo "- Files synced via GitHub Contents API" >> $GITHUB_STEP_SUMMARY
            echo "- Workflow files skipped (requires PAT)" >> $GITHUB_STEP_SUMMARY
            echo "- Build triggered" >> $GITHUB_STEP_SUMMARY
          else
            echo "## No Updates" >> $GITHUB_STEP_SUMMARY
            echo "Already in sync with upstream" >> $GITHUB_STEP_SUMMARY
          fi
